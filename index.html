<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor's Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f8f9fa;
      color: #333;
    }
    header {
      background: #222;
      color: #fff;
      padding: 2rem;
      text-align: center;
      position: relative;
    }
    header h1 { margin: 0; }
    header button {
      margin-top: 1rem;
      background: #28a745;
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    header button:hover {
      background: #218838;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
      padding: 2rem;
    }
    .project {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s ease;
    }
    .project:hover { transform: translateY(-5px); }
    .project img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .project h3 {
      margin: 1rem;
      font-size: 1.2rem;
      color: #222;
    }
    .project p, .project ul {
      margin: 0 1rem 1rem;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .project ul { padding-left: 1.2rem; }
    .contact {
      background: #fff;
      padding: 2rem;
      margin: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .contact h2 {
      margin-top: 0;
      color: #222;
    }
    .contact form {
      display: flex;
      flex-direction: column;
    }
    .contact input, .contact textarea {
      margin-bottom: 1rem;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    .contact button {
      background: #222;
      color: #fff;
      padding: 0.8rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    .contact button:hover {
      background: #444;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #222;
      color: #fff;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Victor's Automation Portfolio</h1>
    <p>Showcasing real business automation projects</p>
    <!-- Hire Me Button -->
    <button onclick="document.getElementById('contact').scrollIntoView({behavior: 'smooth'});">
      Hire Me
    </button>
  </header>

  <section class="grid">
    <!-- Your 7 project cards go here -->
  </section>

  <!-- Contact Section -->
  <section class="contact" id="contact">
    <h2>Work With Me</h2>
    <p>Interested in automating your business workflows? Let’s connect!</p>
    <form action="https://formspree.io/f/yourformid" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>© 2026 Victor Ademola — Business Automation Expert</p>
  </footer>
</body>
</html>
